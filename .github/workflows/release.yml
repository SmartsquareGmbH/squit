name: CD

on:
  release:
    types: [ created ]

jobs:
  publish-maven-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: html-report/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: html-report/.node-version
          cache: pnpm
          cache-dependency-path: html-report/pnpm-lock.yaml

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: "gradle"

      - name: Publish
        run: ./gradlew publishPlugins -Pgradle.publish.key=${{ secrets.PUBLISH_KEY }} -Pgradle.publish.secret=${{ secrets.PUBLISH_SECRET }}

      - name: Upload Gradle reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: Gradle Reports
          path: "**/build/reports"
